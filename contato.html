<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <link

      rel="stylesheet"
    />
    <link rel="favicon" href="/Assets/coelhinho-da-pascoa.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo">DevGirl</a>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="sobre.html">Sobre Mim</a></li>

        <li><a href="contato.html" class="active">Contato</a></li>
      </ul>

    <main>
      <h1>Entre em Contato</h1>
      <p>
        Preencha o formulário abaixo para enviar uma mensagem. Terei prazer em
        responder o mais breve possível.
      </p>

      <form id="form-contato" class="contato-form">
        <div class="form-group">
          <label for="nome">Nome:</label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Seu nome completo"
          />
        </div>

        <div class="form-group">
          <label for="email">E-mail:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seuemail@dominio.com"
          />
        </div>

        <div class="form-group">
          <label for="mensagem">Mensagem:</label>
          <textarea
            id="mensagem"
            name="mensagem"
            rows="5"
            placeholder="Sua mensagem..."
          ></textarea>
        </div>

        <button type="submit" class="btn-enviar">Enviar</button>
      </form>
    </main>

    <footer>
      <p>&copy; 2026 - Criado com ✨ e código puro.</p>
    </footer>

    <style></style>

    <script src="script.js"></script>
